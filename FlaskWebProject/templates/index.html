<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Article CMS</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
    background:#f2f2f2;
}

.navbar{
    background:#222;
    color:white;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
}

.navbar a{
    color:white;
    text-decoration:none;
}

.container{
    margin:30px;
}

h1{
    font-weight:normal;
}

.form-container{
    display:flex;
    gap:60px;
}

.form-left{
    width:400px;
}

label{
    display:block;
    margin-top:10px;
    font-size:14px;
}

input{
    width:100%;
    padding:6px;
    margin-top:5px;
}

textarea{
    width:100%;
    height:250px;
    padding:6px;
    margin-top:5px;
}

.form-right{
    text-align:center;
}

.preview-img{
    width:220px;
    margin-bottom:10px;
}

button{
    margin-top:10px;
    padding:8px 16px;
    cursor:pointer;
    background:#333;
    color:white;
    border:none;
}

.post{
    background:white;
    padding:20px;
    margin-top:20px;
}

.post img{
    width:250px;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="navbar">

<div>Article CMS</div>

<div>
Logged in as {{session["username"]}} |
<a href="/logout">Logout</a>
</div>

</div>


<div class="container">

<h1>Create Post</h1>

<form action="/create_post" method="POST" enctype="multipart/form-data">

<div class="form-container">

<div class="form-left">

<label>Title</label>
<input type="text" name="title" required>

<label>Author</label>
<input type="text" name="author" required>

<label>Body</label>
<textarea name="content" required></textarea>

<button type="submit">Save</button>

</div>


<div class="form-right">

<img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" class="preview-img">

<label>Image</label>
<input type="file" name="image">

</div>

</div>

</form>

<hr>

<h2>All Posts</h2>

{% for post in posts %}

<div class="post">

<h3>{{post.title}}</h3>

<b>Author:</b> {{post.author}}

<p>{{post.body}}</p>

{% if post.image_path %}
<br>
<img src="{{post.image_path}}">
{% endif %}

</div>

{% endfor %}

</div>

</body>
</html>
